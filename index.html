<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 这一行让网页在手机上也能正常显示(自适应屏幕宽度) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 黑话互动词典 · 看懂 AI 圈的行话</title>

  <!-- ===================== 第 1 层:CSS(化妆) ===================== -->
  <style>
    /* :root 里放的是"全局变量",相当于先调好一套配色,后面随时取用 */
    :root {
      --bg: #0b1020;
      --bg-soft: #141b33;
      --card: #1a2342;
      --card-hover: #222d54;
      --text: #eef2ff;
      --text-dim: #9aa6cc;
      --accent: #7c8cff;
      --accent-2: #58e6c9;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    /* 浅色主题:当 <html> 带上 data-theme="light" 时,这里的颜色会覆盖上面的深色 */
    html[data-theme="light"] {
      --bg: #f5f7ff;
      --bg-soft: #ffffff;
      --card: #ffffff;
      --card-hover: #eef2ff;
      --text: #131a2e;
      --text-dim: #5a6488;
      --accent: #5566ee;
      --accent-2: #11b095;
      --border: rgba(20, 30, 80, 0.10);
      --shadow: 0 10px 40px rgba(60, 80, 180, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      /* 给整个背景加一点柔和的光晕,显得高级 */
      background-image:
        radial-gradient(800px 400px at 15% -5%, rgba(124,140,255,0.18), transparent),
        radial-gradient(700px 400px at 100% 0%, rgba(88,230,201,0.12), transparent);
      min-height: 100vh;
      /* 切换深浅色时,颜色平滑过渡,不会"啪"地一下跳变 */
      transition: background-color .3s ease, color .3s ease;
    }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* 右上角的深浅色切换按钮 */
    .theme-toggle {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 10;
      width: 46px; height: 46px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .2s, border-color .2s;
    }
    .theme-toggle:hover { transform: translateY(-2px); border-color: var(--accent); }

    /* 卡片淡入动画:从下方轻轻浮现 */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- 顶部 Hero 区(网页的"门面") ---------- */
    header.hero {
      text-align: center;
      padding: 70px 20px 40px;
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      color: var(--accent-2);
      border: 1px solid var(--border);
      background: rgba(88,230,201,0.08);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
    }
    .hero h1 {
      font-size: clamp(30px, 6vw, 52px);
      line-height: 1.2;
      margin-bottom: 16px;
      /* 给标题加渐变色文字,这是个常见的"高级感"技巧 */
      background: linear-gradient(120deg, var(--text), var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      color: var(--text-dim);
      font-size: clamp(15px, 2.2vw, 18px);
      max-width: 620px;
      margin: 0 auto;
    }
    /* 通往姊妹篇(拆解报告)的入口按钮 */
    .cross-link {
      display: inline-block;
      margin-top: 22px;
      font-size: 15px;
      color: var(--accent-2);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(88,230,201,0.08);
      padding: 10px 20px;
      border-radius: 999px;
      transition: all .18s;
    }
    .cross-link:hover {
      color: #0b1020;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border-color: transparent;
      transform: translateY(-2px);
    }

    /* ---------- 搜索框 + 计数 ---------- */
    .controls {
      margin: 36px auto 10px;
      max-width: 620px;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 16px 18px 16px 48px;
      font-size: 16px;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124,140,255,0.15);
    }
    .search-box .icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 18px;
    }

    /* ---------- 分类筛选小标签 ---------- */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 18px 0 6px;
    }
    .chip {
      font-size: 14px;
      color: var(--text-dim);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all .18s;
      user-select: none;
    }
    .chip:hover { color: var(--text); border-color: var(--accent); }
    .chip.active {
      color: #0b1020;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border-color: transparent;
      font-weight: 600;
    }
    .count {
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
      margin: 8px 0 30px;
    }

    /* ---------- 卡片网格 ---------- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      padding-bottom: 80px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      cursor: pointer;
      transition: transform .18s, background .18s, border-color .18s;
      position: relative;
      overflow: hidden;
      animation: cardIn .45s ease backwards; /* 应用上面定义的淡入动画 */
    }
    .card:hover {
      transform: translateY(-4px);
      background: var(--card-hover);
      border-color: rgba(124,140,255,0.4);
    }
    .card .cat {
      font-size: 12px;
      color: var(--accent-2);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .card h3 {
      font-size: 21px;
      margin-bottom: 4px;
    }
    .card .en {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .card .one-liner {
      font-size: 15px;
      color: var(--text);
    }
    /* 详情区默认收起,点击卡片后展开 */
    .card .detail {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height .35s ease, opacity .3s ease, margin .3s;
      margin-top: 0;
    }
    .card.open .detail {
      max-height: 400px;
      opacity: 1;
      margin-top: 16px;
    }
    .card .detail .story {
      font-size: 14px;
      color: var(--text-dim);
      padding-top: 14px;
      border-top: 1px dashed var(--border);
    }
    .card .detail .pm {
      margin-top: 14px;
      font-size: 14px;
      background: rgba(124,140,255,0.1);
      border-left: 3px solid var(--accent);
      padding: 12px 14px;
      border-radius: 8px;
    }
    .card .detail .pm b { color: var(--accent-2); }
    .card .tap-hint {
      position: absolute;
      top: 22px; right: 22px;
      font-size: 12px;
      color: var(--text-dim);
      transition: transform .25s;
    }
    .card.open .tap-hint { transform: rotate(180deg); }

    /* 搜索没结果时的提示 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-dim);
      padding: 60px 0;
    }

    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      padding: 40px 20px 60px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>

  <!-- 右上角的深浅色切换按钮,点击由 JavaScript 处理 -->

  <div class="wrap">

  <!-- ===================== 第 3 层:JavaScript(行为/互动) ===================== -->

        oneLiner: "模型大到一定程度,突然「无师自通」的新本领。",
        story: "小模型不会的能力(比如多步推理、做数学题),在模型规模超过某个临界点后会「突然」出现,像是量变到质变。这种没被专门教却冒出来的能力,叫涌现。",
        pm: "<b>PM 视角:</b>理解涌现能帮你判断「该等更大的模型,还是该用别的工程手段(如 RAG)补齐能力」。"
      }
    ];

    // ---------- 下面是让网页「活起来」的逻辑 ----------

    const grid = document.getElementById("grid");
    const countEl = document.getElementById("count");
    const filtersEl = document.getElementById("filters");
    const searchEl = document.getElementById("search");

    let activeCat = "全部";          // 当前选中的分类
    let keyword = "";                // 当前搜索关键词

    // 1) 自动收集所有分类,生成顶部的筛选标签
    const cats = ["全部", ...new Set(TERMS.map(t => t.cat))];
    filtersEl.innerHTML = cats
      .map(c => `<span class="chip ${c === "全部" ? "active" : ""}" data-cat="${c}">${c}</span>`)
      .join("");

    // 点击分类标签 → 切换筛选
    filtersEl.addEventListener("click", e => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      activeCat = chip.dataset.cat;
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      render();
    });

    // 在搜索框里打字 → 实时筛选
    searchEl.addEventListener("input", e => {
      keyword = e.target.value.trim().toLowerCase();
      render();
    });

    // 2) render():根据当前的「分类 + 关键词」,把符合的卡片画出来
    function render() {
      const list = TERMS.filter(t => {
        const matchCat = activeCat === "全部" || t.cat === activeCat;
        const haystack = (t.zh + t.en + t.oneLiner + t.story).toLowerCase();
        const matchKw = keyword === "" || haystack.includes(keyword);
        return matchCat && matchKw;
      });

      countEl.textContent = `共 ${list.length} 个词条`;

      if (list.length === 0) {
        grid.innerHTML = `<div class="empty">😶 没找到「${keyword}」相关的词条,换个词试试?</div>`;
        return;
      }

      grid.innerHTML = list.map((t, i) => `
        <article class="card" style="animation-delay:${i * 45}ms">
          <span class="tap-hint">▾</span>
          <div class="cat">${t.cat}</div>
          <h3>${t.zh}</h3>
          <div class="en">${t.en}</div>
          <div class="one-liner">${t.oneLiner}</div>
          <div class="detail">
            <div class="story">📖 ${t.story}</div>
            <div class="pm">${t.pm}</div>
          </div>
        </article>
      `).join("");

      // 给每张卡片绑定「点击展开/收起」
      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => card.classList.toggle("open"));
      });
    }

    // 3) 深浅色切换:点按钮切换主题,并用 localStorage 记住选择
    const themeToggle = document.getElementById("themeToggle");
    // 打开网页时,先读取上次保存的选择
    if (localStorage.getItem("theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
      themeToggle.textContent = "☀️";
    }
    themeToggle.addEventListener("click", () => {
      const isLight = document.documentElement.getAttribute("data-theme") === "light";
      if (isLight) {
        document.documentElement.removeAttribute("data-theme");
        themeToggle.textContent = "🌙";
        localStorage.setItem("theme", "dark");
      } else {
        document.documentElement.setAttribute("data-theme", "light");
        themeToggle.textContent = "☀️";
        localStorage.setItem("theme", "light");
      }
    });

    // 网页一打开,先画一次
    render();
  </script>
</body>
</html>
